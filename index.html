<style>
  :root{
    --ink:#1d2733;
    --paper:#f3efe4;
    --sky-top:#a8d4ec;
    --sky-mid:#cfe6f3;
    --sky-bot:#eaf3f9;
    --far:#a6b8c9;
    --far2:#7e93a8;
    --mid:#8ea2b6;
    --mid2:#6c8198;
    --peak:#9eb1c4;
    --peak-shade:#6c8295;
    --snow:#fafdff;
    --tundra-1:#a8b97c;
    --tundra-2:#8aa05c;
    --tundra-3:#6c8444;
    --water:#cfe2e7;
    --path:#d9cdb8;
    --path2:#bcae93;
    --accent:#d54a3a;
    --warm:#e88a3e;
    --sun:#fff2bd;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#1d2733;font-family:"Bricolage Grotesque",system-ui,sans-serif;color:var(--ink);}
  body{display:grid;place-items:center;padding:24px;}
  .frame{
    width:min(1400px, 100%);
    aspect-ratio: 14 / 9;
    background:var(--paper);
    border-radius:18px;
    box-shadow:0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.15);
    overflow:hidden;
    position:relative;
    isolation:isolate;
  }
  svg{display:block;width:100%;height:100%;}
  .grain{
    position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;opacity:.10;
    background-image:radial-gradient(rgba(0,0,0,.6) 1px, transparent 1.4px);
    background-size: 3px 3px;
  }
  .overlay{
    position:absolute; inset:0; pointer-events:none;
    display:grid; grid-template-rows:auto 1fr auto; padding:36px 46px 38px;
  }
  .top{display:flex; justify-content:space-between; align-items:flex-start;}
  .badge{
    display:inline-flex; align-items:center; gap:10px;
    background:var(--ink); color:var(--paper);
    padding:8px 14px; border-radius:999px;
    font-weight:800; letter-spacing:.18em; font-size:13px; text-transform:uppercase;
  }
  .badge .dot{width:8px;height:8px;border-radius:99px;background:var(--accent);box-shadow:0 0 0 3px rgba(213,74,58,.25);}
  .meta{
    text-align:right; font-weight:600; font-size:14px; letter-spacing:.04em;
    line-height:1.35; color:#39424f;
  }
  .meta b{display:block;font-family:"Archivo Black",sans-serif;font-size:19px;letter-spacing:.02em;color:var(--ink);}
  .center{
    align-self:center; justify-self:center; text-align:center;
    transform: translateY(-4%);
  }
  .label{
    font-weight:800; letter-spacing:.28em; font-size:14px; text-transform:uppercase;
    color:#39424f;
  }
  .num{
    font-family:"Archivo Black", sans-serif;
    font-size: clamp(180px, 27vw, 400px);
    line-height:.85;
    color:var(--ink);
    letter-spacing:-.04em;
    text-shadow:
      6px 6px 0 var(--accent),
      12px 12px 0 var(--warm);
    margin-top:6px;
  }
  .sub{
    font-family:"Archivo Black", sans-serif;
    font-size: clamp(28px, 3.4vw, 52px);
    letter-spacing:.04em;
    color:var(--ink);
    margin-top:-6px;
  }
  .bottom{display:flex; justify-content:space-between; align-items:flex-end; gap:24px;}
  .names{
    background:rgba(29,39,51,.88); color:var(--paper);
    backdrop-filter:blur(2px);
    padding:10px 16px; border-radius:12px;
    font-weight:600; font-size:13px; letter-spacing:.05em;
    max-width: 64%;
  }
  .names b{font-family:"Archivo Black",sans-serif;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--sun);display:block;margin-bottom:2px;}
  .stamp{
    font-family:"Caveat",cursive;
    color:var(--ink);
    border:2px solid var(--ink);
    border-radius:6px;
    padding:6px 14px 4px;
    font-size:22px;
    transform: rotate(-6deg);
    box-shadow: 3px 3px 0 var(--accent);
    background:rgba(243,239,228,.6);
  }
  @media (max-width: 760px){
    .overlay{padding:20px 22px;}
    .num{text-shadow: 4px 4px 0 var(--accent), 8px 8px 0 var(--warm);}
  }
</style>
</head>

<script>
  (function(){
    const el = document.getElementById('dayCount');
    if(!el) return;
    function update(){
      const target = new Date('2026-07-01T08:00:00');
      const now = new Date();
      const diff = target - now;
      const days = Math.max(0, Math.ceil(diff / (1000*60*60*24)));
      el.textContent = days;
    }
    update();
    setInterval(update, 60*60*1000);
  })();
